services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ecancer
      POSTGRES_PASSWORD: ecancer_secret
      POSTGRES_DB: early_cancer_db
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecancer -d early_cancer_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://ecancer:ecancer_secret@db:5432/early_cancer_db
      - FLASK_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
